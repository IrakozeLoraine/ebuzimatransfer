name: ambulance_tracker
description: GPS tracker app installed in ambulances — reports position for active transfers.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  geolocator: ^13.0.1
  shared_preferences: ^2.3.2
  wakelock_plus: ^1.2.8
  mobile_scanner: ^7.2.0
  record: ^7.1.1
  audioplayers: ^6.1.0
  path_provider: ^2.1.4
  flutter_webrtc: ^1.5.0
  web_socket_channel: ^3.0.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
