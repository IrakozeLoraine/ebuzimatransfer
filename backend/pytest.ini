[pytest]
pythonpath = .
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
markers =
    integration: end-to-end tests that drive the FastAPI app against a live database (files named test_integration_*.py)
    unit: pure-logic tests with no database or network (every other test file)
addopts =
    --cov=app
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=95
