services:
  db:
    image: postgres:16-alpine
    container_name: ebuzimadb
    restart: unless-stopped
    environment:
      POSTGRES_USER: ebuzimauser
      POSTGRES_PASSWORD: ebuzimapass
      POSTGRES_DB: ebuzimadb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ebuzimauser -d ebuzimadb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ebuzimaredis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  osrm:
    image: osrm/osrm-backend:latest
    container_name: ebuzimaosrm
    restart: unless-stopped
    volumes:
      - ./osrm-data:/data:ro
    ports:
      - "127.0.0.1:5000:5000"
    command: osrm-routed --algorithm mld /data/rwanda-latest.osrm
    healthcheck:
      test:
        - CMD
        - bash
        - -c
        - exec 3<>/dev/tcp/127.0.0.1/5000
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ebuzimabackend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://ebuzimauser:ebuzimapass@db:5432/ebuzimadb
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-supersecretchangeme}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      ALLOWED_ORIGINS: https://ebuzimatransfer.duckdns.org,http://ebuzimatransfer.duckdns.org,http://localhost:5173,http://localhost:80
      ENVIRONMENT: production
      OSRM_BASE_URL: http://osrm:5000
      WHISPER_MODEL_SIZE: small
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: llama3.2:1b
      MEDIA_ROOT: /app/media
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      # Start-order only, deliberately not service_healthy: routing.py degrades to
      # a straight-line ETA when OSRM is down, and the backend must keep serving
      # dispatch even if the map data is missing or mid-rebuild.
      osrm:
        condition: service_started
    command: >
      sh -c "alembic upgrade head && python seeds.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ebuzimafront
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: ebuzimanginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    # Reload every 6h so renewed certificates are picked up without downtime.
    command: >
      /bin/sh -c "while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g 'daemon off;'"
    depends_on:
      - backend
      - frontend

  # Let's Encrypt client. On startup and every 12h it attempts a renewal; the
  # initial certificate is issued by ./init-letsencrypt.sh (run once on the host).
  certbot:
    image: certbot/certbot
    container_name: ebuzimacertbot
    restart: unless-stopped
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done"

volumes:
  postgres_data:
  certbot_certs:
  certbot_www:
