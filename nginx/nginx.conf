worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:80;
    }

    # Shared proxy rules, reused by the HTTPS server below.
    # (Nginx has no "include location" so the blocks are duplicated where needed.)

    # ---------------------------------------------------------------------------
    # HTTP :80
    #   - Serves the ACME (Let's Encrypt) challenge from the certbot webroot.
    #   - Redirects everything else to HTTPS.
    # ---------------------------------------------------------------------------
    server {
        listen 80;
        server_name ebuzimatransfer.duckdns.org;

        # Let's Encrypt HTTP-01 challenge files are written here by certbot.
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---------------------------------------------------------------------------
    # HTTPS :443
    # ---------------------------------------------------------------------------
    server {
        listen 443 ssl;
        server_name ebuzimatransfer.duckdns.org;

        ssl_certificate     /etc/letsencrypt/live/ebuzimatransfer.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ebuzimatransfer.duckdns.org/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # HSTS: tell browsers to always use HTTPS for this host.
        add_header Strict-Transport-Security "max-age=31536000" always;

        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
        }
    }
}
